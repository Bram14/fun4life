    <style>
      /* Base Settings with Game-like Background */
      body {
        font-family: "Patrick Hand", cursive;
        font-size: 18px;
        background-color: #f8f5ff;
        background-image: radial-gradient(#d8b4fe 1px, transparent 1px);
        background-size: 24px 24px;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }

      html {
        scroll-behavior: smooth;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #9b87f5;
        border-radius: 5px;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7c3aed;
      }

      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 2px solid rgba(155, 135, 245, 0.2);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      .game-card {
        transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        border-bottom-width: 6px;
      }
      .game-card:active {
        transform: translateY(4px);
        border-bottom-width: 0px;
        margin-top: 4px;
        box-shadow: none;
      }

      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float 7s ease-in-out infinite 1s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .animate-pulse-slow {
        animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(0.95);
        }
      }

      .animate-wave {
        animation: wave 2.5s infinite;
      }
      @keyframes wave {
        0% {
          transform: rotate(0deg);
        }
        10% {
          transform: rotate(14deg);
        }
        20% {
          transform: rotate(-8deg);
        }
        30% {
          transform: rotate(14deg);
        }
        40% {
          transform: rotate(-4deg);
        }
        50% {
          transform: rotate(10deg);
        }
        60% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      .typing-cursor::after {
        content: "|";
        display: inline-block;
        animation: blink 1s step-end infinite;
        color: #9b87f5;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .shape-blob {
        position: absolute;
        filter: blur(50px);
        z-index: -2;
        opacity: 0.4;
        animation: float 10s infinite alternate;
      }
    </style>

        typeof __firebase_config !== "undefined"
          ? JSON.parse(__firebase_config)
          : {
              apiKey: "AIzaSyDm7EPUYAmnob8G2m1r_Vx1Qju1KPzqH7g",
              authDomain: "fun4life-web.firebaseapp.com",
              projectId: "fun4life-web",
              storageBucket: "fun4life-web.firebasestorage.app",
              messagingSenderId: "349803874548",
              appId: "1:349803874548:web:278748343118d2b16df6a1",
              measurementId: "G-R0H6JR8G3B",
            };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = typeof __app_id !== "undefined" ? __app_id : "fun4life-web";

      window.Firebase = {
        auth,
        db,
        appId,
        signInAnonymously,
        signInWithCustomToken,
        onAuthStateChanged,
        collection,
        addDoc,
        onSnapshot,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        increment,
      };

      const initAuth = async () => {
        try {
          if (
            typeof __initial_auth_token !== "undefined" &&
            __initial_auth_token
          ) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (error) {
          try {
            await signInAnonymously(auth);
          } catch (err) {}
        }
      };
      initAuth();
    </script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // --- 1. UTILITY COMPONENTS ---
      const Icon = ({ icon, size = 24, className = "" }) => (
        <iconify-icon
          icon={icon}
          width={size}

      );

      const Card = ({ children, onClick, color = "white", className = "" }) => {
        const colors = {

            "bg-white border-purple-100 border-2 hover:border-primary text-slate-700",
          purple:

            <div className="shape-blob w-72 h-72 bg-pink-200 rounded-full top-[20%] right-[-15%] mix-blend-multiply animation-delay-2000 opacity-20"></div>
            <div className="shape-blob w-48 h-48 bg-blue-200 rounded-full bottom-[-5%] left-[20%] mix-blend-multiply animation-delay-4000 opacity-20"></div>
            <div className="absolute top-[15%] left-[5%] text-purple-300 animate-float opacity-30">

            <div className="absolute top-[20%] right-[8%] text-pink-300 animate-float-delayed opacity-30">

            <div className="absolute bottom-[20%] left-[8%] text-blue-300 animate-bounce opacity-20">
              <Icon icon="lucide:ghost" size={56} />
            </div>
          </div>

          <nav className="fixed top-0 w-full glass-nav z-50 h-20 transition-all">
            <div className="max-w-7xl w-full mx-auto px-4 md:px-8 h-full flex justify-between items-center">
              <div
                className="flex items-center gap-3 cursor-pointer group select-none"

                <div className="bg-primary text-white p-2.5 rounded-xl shadow-game group-hover:rotate-12 transition-transform duration-300 border-2 border-white">
                  <Icon icon="lucide:gamepad-2" className="text-2xl" />
                </div>

                <input

                  placeholder="Cari materi atau game..."
                  className="bg-transparent border-none outline-none text-lg w-full placeholder:text-slate-400 text-slate-700 font-medium"
                  value={searchTerm}
                  onChange={(e) => {
                    setSearchTerm(e.target.value);
                    if (activePage !== "home" && e.target.value.length > 0)
                      navigate("home");

                />
                {searchTerm && (
                  <button
                    onClick={() => setSearchTerm("")}

          <main className="flex-grow pt-28 md:pt-32 px-4 md:px-8 max-w-7xl mx-auto w-full relative z-10 fade-in pb-10">

            {activePage === "efikasi-diri" && (
              <button

                className="game-card mb-4 flex items-center gap-2 text-slate-600 hover:text-white hover:bg-primary font-bold transition-all group bg-white px-5 py-2.5 rounded-full w-fit border-b-4 border-slate-200 hover:border-b-primaryHover text-lg"
              >
                <Icon icon="lucide:arrow-left" size={24} /> <span>Beranda</span>

            {searchTerm && activePage === "home" && (

            </button>

          <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border-4 border-white max-w-lg w-full relative overflow-hidden">
            <div className="w-24 h-24 mx-auto rounded-3xl flex items-center justify-center mb-6 shadow-game text-white bg-yellow-400 animate-pulse-slow border-b-4 border-yellow-500">

            </button>

      // --- 3. PAGE COMPONENTS ---
      const Home = ({ navigate, searchTerm, setSearchTerm }) => {
        const [textIndex, setTextIndex] = useState(0);
        const fullText =
          "Di sini kamu bisa menemukan Materi & Game Seru Seputar BK!";

        useEffect(() => {
          if (textIndex < fullText.length) {
            const timeout = setTimeout(() => setTextIndex(textIndex + 1), 80);
            return () => clearTimeout(timeout);
          }
        }, [textIndex]);

        const services = [
          {
            id: "bidang-pribadi",
            title: "Bidang Pribadi",
            subtitle: "",
            desc: "Pengembangan Jati Diri",
            color: "purple",
            icon: "lucide:smile-plus",
            route: "bidang-pribadi",
            level: "",
            xp: "",
            status: "unlocked",
            decos: [
              {
                icon: "lucide:crown",
                className: "top-3 right-3",
                delay: "0s",
                size: 24,
              },
            ],
          },
          {
            id: "bidang-sosial",
            title: "Bidang Sosial",
            subtitle: "",
            desc: "Interaksi & Hubungan",
            color: "blue",
            icon: "lucide:message-circle-heart",
            route: "feature-locked",
            level: "",
            xp: "500 XP",
            status: "locked",
            decos: [
              {
                icon: "lucide:heart",
                className: "top-3 left-3",
                delay: "0.5s",
                size: 22,
              },
            ],
          },
          {
            id: "bidang-belajar",
            title: "Bidang Belajar",
            subtitle: "",
            desc: "Strategi Belajar",
            color: "green",
            icon: "lucide:brain-circuit",
            route: "feature-locked",
            level: "",
            xp: "1000 XP",
            status: "locked",
            decos: [
              {
                icon: "lucide:book-open",
                className: "top-2 inset-x-0 mx-auto w-fit",
                delay: "0.2s",
                size: 24,
              },
            ],
          },
          {
            id: "bidang-karir",
            title: "Bidang Karir",
            subtitle: "",
            desc: "Masa Depan.",
            color: "pink",
            icon: "lucide:rocket",
            route: "feature-locked",
            level: "",
            xp: "2000 XP",
            status: "locked",
            decos: [

                delay: "0.8s",

            id: "about",
            title: "Tentang Website",
            icon: "lucide:info",
            route: "about",
          },
          {
            id: "contact",
            title: "Kontak",
            icon: "lucide:phone",
            route: "contact",

        const filteredServices = services.filter(

            s.title.toLowerCase().includes(searchTerm.toLowerCase()) ||

          h.title.toLowerCase().includes(searchTerm.toLowerCase()),

        const hasResults =
          filteredServices.length > 0 || filteredHelp.length > 0;

        return (

                <div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">

                    <div

      // --- APP ROUTER ---
      const App = () => {
        const [history, setHistory] = useState([{ name: "home", data: null }]);
        const [searchTerm, setSearchTerm] = useState("");
        const currentPage = history[history.length - 1];

        const navigate = (pageName, data = null) => {
          if (pageName !== "home") setSearchTerm("");
          if (pageName === "back") {
            if (history.length > 1) setHistory((prev) => prev.slice(0, -1));
          } else {
            setHistory((prev) => [...prev, { name: pageName, data: data }]);
          }
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        const renderPage = () => {
          const { name, data } = currentPage;
          switch (name) {
            case "home":
              return (
                <Home
                  navigate={navigate}
                  searchTerm={searchTerm}
                  setSearchTerm={setSearchTerm}
                />
              );
            case "bidang-pribadi":
              return <BidangPribadi navigate={navigate} />;
            case "efikasi-diri":
              return <KepercayaanDiri navigate={navigate} />;
            case "video-inspiratif":
              return <VideoInspiratif navigate={navigate} />;
            case "game-magnitude":
              return <GameMagnitude navigate={navigate} />;
            case "game-strength":
              return <GameStrength navigate={navigate} />;
            case "game-generality":
              return <GameGenerality navigate={navigate} />;
            case "materi-pd":
              return <MateriPD />;
            case "about":

            case "curhat-anonym":

            case "ruang-refleksi":
              return <RuangRefleksi navigate={navigate} />;
            case "finish-reward":
              return <FinishReward navigate={navigate} />;
            case "feature-locked":
              return <FeatureLocked feature={data} navigate={navigate} />;
            default:
              return (
                <Home
                  navigate={navigate}
                  searchTerm={searchTerm}
                  setSearchTerm={setSearchTerm}
                />
              );
          }
        };

        return (
          <Layout
            navigate={navigate}
            activePage={currentPage.name}
            searchTerm={searchTerm}
            setSearchTerm={setSearchTerm}
          >
            {renderPage()}
          </Layout>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>

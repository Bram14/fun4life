<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Fun4Life - Bimbingan Konseling Interaktif</title>
    <meta
      name="description"
      content="Website Bimbingan Konseling Interaktif karya Mahasiswa untuk siswa sekolah."
    />

    <!-- 1. LIBRARIES (CDN) -->
    <!-- Styling Framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
    <!-- React Core -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <!-- Babel (JSX Compiler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Hand-Drawn (Patrick Hand) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />

    <!-- 2. CUSTOM STYLES & CONFIG -->
    <style>
      /* Base Settings with Game-like Background */
      body {
        font-family: "Patrick Hand", cursive; /* Menggunakan Font Hand-Drawn */
        font-size: 18px; /* Sedikit diperbesar agar lebih terbaca */
        background-color: #f8f5ff;
        /* Pola Dot Halus */
        background-image: radial-gradient(#d8b4fe 1px, transparent 1px);
        background-size: 24px 24px;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }

      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #9b87f5;
        border-radius: 5px;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7c3aed;
      }

      /* Glassmorphism Navbar */
      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 2px solid rgba(155, 135, 245, 0.2);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      /* Game Card Effect (3D Press) */
      .game-card {
        transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        border-bottom-width: 6px;
      }
      .game-card:active {
        transform: translateY(4px);
        border-bottom-width: 0px; /* Efek tombol ditekan */
        margin-top: 4px; /* Kompensasi tinggi */
        box-shadow: none;
      }

      /* Animations */
      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float 7s ease-in-out infinite 1s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .animate-pulse-slow {
        animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(0.95);
        }
      }

      .animate-spin-slow {
        animation: spin 10s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Typing Cursor */
      .typing-cursor::after {
        content: "|";
        display: inline-block;
        animation: blink 1s step-end infinite;
        color: #9b87f5;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Floating Shapes Background */
      .shape-blob {
        position: absolute;
        filter: blur(50px);
        z-index: -2; /* Di belakang ikon game */
        opacity: 0.4;
        animation: float 10s infinite alternate;
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#9b87f5" /* Ungu Utama Fun4Life */,
              primaryHover: "#7c3aed",
              secondary: "#ede9fe",
              accent: "#f472b6" /* Pink Aksen */,
              dark: "#2e1065" /* Ungu Sangat Gelap untuk Teks */,
            },
            boxShadow: {
              game: "0 10px 0 0 rgba(0,0,0,0.1)" /* Shadow tebal ala game */,
              glow: "0 0 20px rgba(155, 135, 245, 0.5)",
            },
            borderRadius: {
              xl: "1rem",
              "2xl": "1.5rem",
              "3xl": "2rem",
            },
            fontFamily: {
              sans: ['"Patrick Hand"', "cursive"], // Override default sans font
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <!-- FIREBASE SETUP -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
        signInWithCustomToken,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        increment,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // Konfigurasi Firebase dari Environment
      const firebaseConfig = JSON.parse(__firebase_config);
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId =
        typeof __app_id !== "undefined" ? __app_id : "default-app-id";

      // Ekspos ke window agar bisa dipakai di React
      window.Firebase = {
        auth,
        db,
        appId,
        signInAnonymously,
        signInWithCustomToken,
        onAuthStateChanged,
        collection,
        addDoc,
        onSnapshot,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        increment,
      };

      // Autentikasi Awal dengan Fallback
      const initAuth = async () => {
        try {
          if (
            typeof __initial_auth_token !== "undefined" &&
            __initial_auth_token
          ) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (error) {
          console.warn("Auth token gagal, mencoba login anonim...", error);
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Login anonim gagal total:", err);
          }
        }
      };
      initAuth();
    </script>

    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // --- 1. UTILITY COMPONENTS ---

      const Icon = ({ icon, size = 24, className = "" }) => (
        <iconify-icon
          icon={icon}
          width={size}
          height={size}
          className={className}
        ></iconify-icon>
      );

      const Card = ({ children, onClick, color = "white", className = "" }) => {
        const colors = {
          white:
            "bg-white border-purple-100 border-2 hover:border-primary text-slate-700",
          purple:
            "bg-primary text-white border-primaryHover border-2 shadow-purple-300",
          blue: "bg-blue-500 text-white border-blue-600 border-2 shadow-blue-300",
          green:
            "bg-green-500 text-white border-green-600 border-2 shadow-green-300",
          pink: "bg-pink-500 text-white border-pink-600 border-2 shadow-pink-300",
        };

        const borderBottomColors = {
          white: "border-b-purple-200",
          purple: "border-b-[#7c3aed]",
          blue: "border-b-blue-700",
          green: "border-b-green-700",
          pink: "border-b-pink-700",
        };

        return (
          <div
            onClick={onClick}
            className={`
              game-card
              ${colors[color]} 
              ${borderBottomColors[color]}
              rounded-3xl p-6 
              cursor-pointer 
              relative overflow-hidden 
              ${className}
            `}
          >
            {children}
          </div>
        );
      };

      const VisitorCounter = () => {
        const [views, setViews] = useState(0);

        useEffect(() => {
          const interval = setInterval(() => {
            if (window.Firebase) {
              clearInterval(interval);
              const {
                db,
                appId,
                doc,
                getDoc,
                setDoc,
                updateDoc,
                increment,
                auth,
                onAuthStateChanged,
                onSnapshot,
              } = window.Firebase;

              const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
                if (user) {
                  const docRef = doc(
                    db,
                    "artifacts",
                    appId,
                    "public",
                    "data",
                    "visitor_counter",
                    "main",
                  );

                  const unsubscribeSnapshot = onSnapshot(
                    docRef,
                    (docSnap) => {
                      if (docSnap.exists()) {
                        setViews(docSnap.data().count || 0);
                      }
                    },
                    (err) => console.error("Snapshot error:", err),
                  );

                  const sessionKey = "has_visited_" + appId;
                  if (!sessionStorage.getItem(sessionKey)) {
                    try {
                      const snap = await getDoc(docRef);
                      if (snap.exists()) {
                        await updateDoc(docRef, { count: increment(1) });
                      } else {
                        await setDoc(docRef, { count: 1 });
                      }
                      sessionStorage.setItem(sessionKey, "true");
                    } catch (e) {
                      console.error("Counter error", e);
                    }
                  }
                }
              });
            }
          }, 500);
          return () => clearInterval(interval);
        }, []);

        return (
          <div className="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full border-2 border-purple-100 text-base font-bold text-primary mt-6 shadow-game backdrop-blur-sm">
            <span className="flex h-2 w-2 relative">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span>
              {views > 0 ? views.toLocaleString("id-ID") : "..."} Pengunjung
              Online
            </span>
          </div>
        );
      };

      const CommentSection = () => {
        const [comments, setComments] = useState([]);
        const [name, setName] = useState("");
        const [msg, setMsg] = useState("");
        const [isLoading, setIsLoading] = useState(true);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [status, setStatus] = useState("connecting");

        useEffect(() => {
          const interval = setInterval(() => {
            if (window.Firebase) {
              clearInterval(interval);
              const {
                db,
                appId,
                collection,
                onSnapshot,
                auth,
                onAuthStateChanged,
              } = window.Firebase;

              const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                if (user) {
                  setStatus("connected");
                  const q = collection(
                    db,
                    "artifacts",
                    appId,
                    "public",
                    "data",
                    "comments",
                  );

                  const unsubscribeSnapshot = onSnapshot(
                    q,
                    (snapshot) => {
                      const loaded = snapshot.docs.map((d) => d.data());
                      loaded.sort(
                        (a, b) => new Date(b.isoDate) - new Date(a.isoDate),
                      );
                      setComments(loaded);
                      setIsLoading(false);
                    },
                    (error) => {
                      console.error("Error loading comments:", error);
                      setStatus("error");
                      setIsLoading(false);
                    },
                  );
                  return () => unsubscribeSnapshot();
                } else {
                  // Waiting for auth
                }
              });
            }
          }, 500);

          return () => clearInterval(interval);
        }, []);

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!name.trim() || !msg.trim()) return;

          if (status !== "connected") {
            alert(
              "Koneksi belum siap. Coba refresh halaman jika ini terus terjadi.",
            );
            return;
          }

          setIsSubmitting(true);
          try {
            const { db, appId, collection, addDoc } = window.Firebase;
            const newComment = {
              name,
              msg,
              date: new Date().toLocaleDateString("id-ID"),
              isoDate: new Date().toISOString(),
            };

            await addDoc(
              collection(db, "artifacts", appId, "public", "data", "comments"),
              newComment,
            );
            setName("");
            setMsg("");
          } catch (e) {
            console.error("Gagal mengirim:", e);
            alert("Gagal mengirim pesan. Pastikan internet lancar.");
          } finally {
            setIsSubmitting(false);
          }
        };

        return (
          <div className="w-full max-w-4xl mx-auto mt-16 mb-10 fade-in px-4 md:px-0 relative z-10">
            <h2 className="text-3xl font-bold text-dark text-center mb-6 flex items-center justify-center gap-2 bg-white/50 py-2 rounded-full w-fit mx-auto px-6 backdrop-blur-sm border border-white">
              <Icon
                icon="lucide:message-circle-heart"
                className="text-primary"
              />{" "}
              Ruang Sapa & Diskusi
            </h2>
            <div className="bg-white/90 backdrop-blur-xl rounded-[2.5rem] p-6 md:p-8 shadow-xl border-4 border-white flex flex-col md:flex-row gap-8">
              <div className="w-full md:w-1/3">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-bold text-primary text-xl uppercase tracking-wide">
                    Kirim Pesan
                  </h3>
                  <div className="flex items-center gap-1.5 bg-slate-100 px-2 py-1 rounded-full">
                    <div
                      className={`w-2 h-2 rounded-full ${status === "connected" ? "bg-green-500 animate-pulse" : status === "error" ? "bg-red-500" : "bg-yellow-500 animate-pulse"}`}
                    ></div>
                    <span className="text-[12px] text-slate-500 font-medium">
                      {status === "connected"
                        ? "Siap"
                        : status === "error"
                          ? "Error"
                          : "Konek..."}
                    </span>
                  </div>
                </div>

                <form onSubmit={handleSubmit} className="space-y-3">
                  <input
                    type="text"
                    placeholder="Nama Kamu"
                    className="w-full p-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 text-lg focus:outline-none focus:border-primary focus:bg-white transition font-bold text-slate-600 placeholder:font-normal"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    maxLength={20}
                    required
                    disabled={isSubmitting || status !== "connected"}
                  />
                  <textarea
                    placeholder="Tulis pesan semangat..."
                    className="w-full p-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 text-lg focus:outline-none focus:border-primary focus:bg-white transition h-24 resize-none font-medium text-slate-600 placeholder:font-normal"
                    value={msg}
                    onChange={(e) => setMsg(e.target.value)}
                    maxLength={150}
                    required
                    disabled={isSubmitting || status !== "connected"}
                  ></textarea>
                  <button
                    type="submit"
                    disabled={isSubmitting || status !== "connected"}
                    className={`game-card w-full text-white py-3.5 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 border-b-4 ${
                      isSubmitting || status !== "connected"
                        ? "bg-slate-400 border-b-slate-500 cursor-not-allowed"
                        : "bg-dark border-b-black hover:bg-primary hover:border-b-primaryHover"
                    }`}
                  >
                    {isSubmitting ? "Mengirim..." : "Kirim"}
                    {!isSubmitting && <Icon icon="lucide:send" size={20} />}
                  </button>
                </form>
              </div>
              <div className="w-full md:w-2/3 md:border-l-2 border-slate-100 md:pl-8">
                <h3 className="font-bold text-primary mb-4 text-xl uppercase tracking-wide">
                  Pesan Terbaru
                </h3>
                <div className="space-y-3 max-h-[320px] overflow-y-auto pr-2 custom-scrollbar">
                  {isLoading ? (
                    <div className="text-center py-8 text-slate-400 text-lg animate-pulse flex flex-col items-center">
                      <Icon
                        icon="lucide:loader-2"
                        className="animate-spin mb-2"
                        size={28}
                      />
                      Memuat percakapan...
                    </div>
                  ) : comments.length > 0 ? (
                    comments.map((c, idx) => (
                      <div
                        key={idx}
                        className="bg-purple-50 p-4 rounded-2xl border border-purple-100 animate-in fade-in slide-in-from-bottom-2"
                      >
                        <div className="flex justify-between items-center mb-1">
                          <span className="font-bold text-primary text-lg">
                            {c.name}
                          </span>
                          <span className="text-sm text-slate-400 font-medium bg-white px-2 py-0.5 rounded-full">
                            {c.date}
                          </span>
                        </div>
                        <p className="text-slate-700 text-lg leading-relaxed">
                          {c.msg}
                        </p>
                      </div>
                    ))
                  ) : (
                    <div className="text-center text-slate-400 text-lg py-8 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-200">
                      <p>Belum ada pesan.</p>
                      <p className="text-base mt-1">
                        Jadilah yang pertama menyapa!
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- 2. LAYOUT COMPONENTS ---

      const Layout = ({
        children,
        navigate,
        activePage,
        searchTerm,
        setSearchTerm,
      }) => (
        <div className="min-h-screen flex flex-col relative overflow-hidden">
          {/* Background Decorations */}
          <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="shape-blob w-64 h-64 bg-purple-300 rounded-full top-[-10%] left-[-10%] mix-blend-multiply opacity-20"></div>
            <div className="shape-blob w-72 h-72 bg-pink-200 rounded-full top-[20%] right-[-15%] mix-blend-multiply animation-delay-2000 opacity-20"></div>
            <div className="shape-blob w-48 h-48 bg-blue-200 rounded-full bottom-[-5%] left-[20%] mix-blend-multiply animation-delay-4000 opacity-20"></div>

            <div className="absolute top-[15%] left-[5%] text-purple-300 animate-float opacity-30">
              <Icon icon="lucide:joystick" size={64} />
            </div>
            <div className="absolute top-[20%] right-[8%] text-pink-300 animate-float-delayed opacity-30">
              <Icon icon="lucide:gamepad-2" size={80} />
            </div>
            <div className="absolute bottom-[20%] left-[8%] text-blue-300 animate-bounce opacity-20">
              <Icon icon="lucide:ghost" size={56} />
            </div>
            <div className="absolute bottom-[10%] right-[20%] text-yellow-300 animate-pulse-slow opacity-40">
              <Icon icon="lucide:trophy" size={72} />
            </div>
            <div className="absolute top-[50%] left-[2%] text-green-300 animate-float opacity-30">
              <Icon icon="lucide:sword" size={60} />
            </div>
            <div className="absolute top-[40%] right-[3%] text-red-300 animate-float-delayed opacity-20">
              <Icon icon="lucide:heart" size={48} />
            </div>
            <div className="absolute top-[5%] left-[40%] text-orange-300 animate-spin-slow opacity-30">
              <Icon icon="lucide:star" size={40} />
            </div>
            <div className="absolute bottom-[40%] right-[10%] text-indigo-300 opacity-20 rotate-12">
              <Icon icon="lucide:smile" size={64} />
            </div>
          </div>

          {/* Navbar */}
          <nav className="fixed top-0 w-full glass-nav z-50 h-20 transition-all">
            <div className="max-w-6xl w-full mx-auto px-4 md:px-8 h-full flex justify-between items-center">
              <div
                className="flex items-center gap-3 cursor-pointer group select-none"
                onClick={() => navigate("home")}
              >
                <div className="bg-primary text-white p-2.5 rounded-xl shadow-game group-hover:rotate-12 transition-transform duration-300 border-2 border-white">
                  <Icon icon="lucide:gamepad-2" className="text-2xl" />
                </div>
                <span className="text-2xl md:text-3xl font-black tracking-tight text-dark group-hover:text-primary transition-colors">
                  Fun4Life
                </span>
              </div>

              {/* Desktop Search */}
              <div className="hidden md:flex items-center bg-white rounded-full px-5 py-3 border-2 border-purple-100 focus-within:border-primary focus-within:shadow-lg transition-all w-80">
                <Icon
                  icon="lucide:search"
                  className="text-slate-400 mr-3"
                  size={24}
                />
                <input
                  type="text"
                  placeholder="Cari materi atau game..."
                  className="bg-transparent border-none outline-none text-lg w-full placeholder:text-slate-400 text-slate-700 font-medium"
                  value={searchTerm}
                  onChange={(e) => {
                    setSearchTerm(e.target.value);
                    if (activePage !== "home" && e.target.value.length > 0)
                      navigate("home");
                  }}
                />
                {searchTerm && (
                  <button
                    onClick={() => setSearchTerm("")}
                    className="text-slate-400 hover:text-red-500"
                  >
                    <Icon icon="lucide:x" size={20} />
                  </button>
                )}
              </div>
            </div>
          </nav>

          {/* Main Content */}
          <main className="flex-grow pt-28 md:pt-36 px-4 md:px-8 max-w-6xl mx-auto w-full relative z-10 fade-in pb-10">
            {activePage !== "home" && activePage !== "feature-locked" && (
              <button
                onClick={() => navigate("back")}
                className="game-card mb-8 flex items-center gap-2 text-slate-600 hover:text-white hover:bg-primary font-bold transition-all group bg-white px-5 py-2.5 rounded-full w-fit border-b-4 border-slate-200 hover:border-b-primaryHover text-lg"
              >
                <Icon icon="lucide:arrow-left" size={24} />
                <span>Kembali</span>
              </button>
            )}

            {searchTerm && activePage === "home" && (
              <div className="mb-8 flex items-center gap-2 text-slate-600 bg-white p-4 rounded-2xl w-fit shadow-sm border border-purple-50">
                <Icon icon="lucide:search" size={24} />
                <span>
                  Menampilkan hasil:{" "}
                  <b className="text-primary">"{searchTerm}"</b>
                </span>
              </div>
            )}

            {children}
          </main>

          {/* Footer */}
          <footer className="py-10 text-center text-slate-500 text-lg border-t-2 border-purple-100 bg-white/60 backdrop-blur-md mt-auto relative z-10">
            <div className="container mx-auto px-4">
              <p className="font-bold mb-2 text-dark">
                © 2025 Fun4Life - Website Layanan Bimbingan Konseling
              </p>
              <p className="text-base font-medium opacity-70">
                Dibuat oleh Mahasiswa Bimbingan Konseling
              </p>
              <VisitorCounter />
            </div>
          </footer>
        </div>
      );

      const FeatureLocked = ({ feature, navigate }) => (
        <div className="flex flex-col items-center justify-center min-h-[50vh] py-10 px-4 text-center">
          <div className="w-full max-w-lg mb-6 text-left">
            <button
              onClick={() => navigate("back")}

        const currentPage = history[history.length - 1];

        const navigate = (pageName, data = null) => {
          if (pageName !== "home") setSearchTerm("");
          if (pageName === "back") {
            if (history.length > 1) setHistory((prev) => prev.slice(0, -1));
          } else {
            setHistory((prev) => [...prev, { name: pageName, data: data }]);
          }
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        const renderPage = () => {
          const { name, data } = currentPage;
          switch (name) {

                  searchTerm={searchTerm}

                  setSearchTerm={setSearchTerm}

              );
          }
